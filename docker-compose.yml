version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: resumeverify_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 837479
      POSTGRES_DB: smart_resume_verifier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: resumeverify_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: resumeverify_api
    environment:
      DATABASE_URL: postgresql://postgres:837479@postgres:5432/smart_resume_verifier
      REDIS_URL: redis://redis:6379
      JWT_SECRET: SMART_RESUME_VERIFIER_2026_PROJECT_KEY
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: resumeverify_web
    environment:
      NEXT_PUBLIC_API_URL: http://api:5000
      NEXT_PUBLIC_WS_URL: ws://api:5000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
