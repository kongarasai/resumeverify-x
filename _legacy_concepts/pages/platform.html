<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResumeVerify X™ — Universal AI Career Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090d;--bg2:#0f1117;--bg3:#161923;--bg4:#1e2330;
  --b:#ffffff0d;--b2:#ffffff18;--b3:#ffffff28;
  --t:#e2e6f0;--t2:#8b92a5;--t3:#4a5068;
  --blue:#4f8ef7;--bd:#1a3560;--bl:#7db4ff;
  --green:#34d399;--gd:#0d3d2a;
  --amber:#f59e0b;--ad:#3d2800;
  --red:#f87171;--rd:#3d1010;
  --purple:#a78bfa;--pd:#2d1a5c;
  --cyan:#22d3ee;--cd:#0a2d36;
}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:13px;overflow:hidden;height:100vh}
.root{display:flex;height:100vh}
.rolebar{width:52px;background:var(--bg2);border-right:1px solid var(--b);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px;flex-shrink:0}
.rlogo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;margin-bottom:8px}
.rbtn{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:9px;font-weight:700;color:var(--t3);transition:all .15s;border:1px solid transparent;position:relative}
.rbtn:hover{background:var(--bg3);color:var(--t2)}
.rbtn.on{background:var(--bd);color:var(--bl);border-color:var(--bd)}
.rbtn[data-tip]:hover::after{content:attr(data-tip);position:absolute;left:46px;top:50%;transform:translateY(-50%);background:var(--bg4);border:1px solid var(--b2);border-radius:6px;padding:3px 8px;font-size:10px;white-space:nowrap;color:var(--t);z-index:200}
.rdiv{width:28px;height:1px;background:var(--b2);margin:4px 0}
.sidebar{width:196px;background:var(--bg2);border-right:1px solid var(--b);display:flex;flex-direction:column;padding:10px 8px;gap:1px;flex-shrink:0;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:0}
.ss{font-size:9px;color:var(--t3);letter-spacing:.8px;padding:10px 8px 4px;text-transform:uppercase;font-weight:700}
.si{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;color:var(--t2);font-size:12px;border:1px solid transparent;transition:all .12s}
.si:hover{background:var(--bg3);color:var(--t)}
.si.on{background:var(--bd);color:var(--bl);border-color:#4f8ef720}
.si svg{width:15px;height:15px;flex-shrink:0;opacity:.8}
.si.on svg{opacity:1}
.sbadge{margin-left:auto;background:var(--red);color:#fff;border-radius:8px;padding:1px 5px;font-size:9px;font-weight:700}
.mwrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:48px;background:var(--bg2);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.bc{font-size:11px;color:var(--t3)}
.tsearch{flex:1;max-width:300px;height:30px;background:var(--bg3);border:1px solid var(--b);border-radius:8px;display:flex;align-items:center;padding:0 10px;gap:6px;margin-left:10px}
.tsearch input{background:none;border:none;color:var(--t);font-size:11px;outline:none;flex:1}
.tsearch input::placeholder{color:var(--t3)}
.tr{margin-left:auto;display:flex;align-items:center;gap:8px}
.tpill{display:flex;align-items:center;gap:5px;background:var(--gd);border:1px solid #34d39920;border-radius:20px;padding:3px 9px;font-size:11px;color:var(--green)}
.ibtn{width:28px;height:28px;background:var(--bg3);border:1px solid var(--b);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);position:relative}
.ibtn:hover{border-color:var(--b2);color:var(--t)}
.nbadge{position:absolute;top:-3px;right:-3px;width:12px;height:12px;background:var(--red);border-radius:50%;font-size:8px;display:flex;align-items:center;justify-content:center;color:#fff;border:2px solid var(--bg2)}
.av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer}
.content{flex:1;overflow-y:auto;padding:16px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--b2)}
.ph{margin-bottom:16px}
.ph h1{font-size:18px;font-weight:700;margin-bottom:3px}
.ph p{font-size:11px;color:var(--t3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.mb{margin-bottom:12px}
.card{background:var(--bg2);border:1px solid var(--b);border-radius:13px;padding:14px}
.csm{background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:10px}
.stat{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:12px;cursor:pointer;transition:all .12s;overflow:hidden;position:relative}
.stat:hover{border-color:var(--b2);transform:translateY(-1px)}
.slabel{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.sval{font-size:20px;font-weight:800;margin-bottom:2px;line-height:1}
.ssub{font-size:10px;color:var(--t3)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;transition:all .12s;white-space:nowrap}
.bp{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff}
.bp:hover{opacity:.88}
.bs{background:var(--bg3);color:var(--t);border:1px solid var(--b2)}
.bs:hover{border-color:var(--b3)}
.bg2btn{background:var(--gd);color:var(--green);border:1px solid #34d39920}
.br{background:var(--rd);color:var(--red);border:1px solid #f8717120}
.bxs{padding:4px 9px;font-size:10px}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.tg{background:var(--gd);color:var(--green)}
.ta{background:var(--ad);color:var(--amber)}
.tr2{background:var(--rd);color:var(--red)}
.tb{background:var(--bd);color:var(--blue)}
.tp{background:var(--pd);color:var(--purple)}
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:6px 10px;border-radius:7px;cursor:pointer;font-size:11px;color:var(--t3);transition:all .12s;white-space:nowrap}
.tab.on{background:var(--bg2);color:var(--t);font-weight:600}
.prog{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:3px}
.pf{height:100%;border-radius:3px}
.rw{position:relative;width:84px;height:84px;flex-shrink:0}
.rw svg{transform:rotate(-90deg)}
.rn{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.br2{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:5px}
.bl2{width:80px;color:var(--t3);flex-shrink:0;font-size:10px}
.bb{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.bf{height:100%;border-radius:2px}
.bv{width:22px;text-align:right;font-size:10px;color:var(--t3)}
.kanban{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px}
.kanban::-webkit-scrollbar{height:3px}
.kcol{background:var(--bg3);border:1px solid var(--b);border-radius:10px;padding:10px;min-width:138px;flex-shrink:0}
.kcol h4{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin-bottom:8px;font-weight:700}
.kcard{background:var(--bg2);border:1px solid var(--b);border-radius:7px;padding:8px;margin-bottom:6px;font-size:11px;cursor:pointer;transition:all .12s}
.kcard:hover{border-color:var(--bd)}
.editor{background:#0d1117;border:1px solid var(--b);border-radius:10px;padding:12px;font-family:'Fira Code',monospace;font-size:11px;color:#c9d1d9;white-space:pre;overflow-x:auto;line-height:1.7;margin-bottom:10px}
.kw{color:#ff7b72}.fn{color:#79c0ff}.st{color:#a5d6ff}
.crow{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;border:1px solid var(--b);margin-bottom:8px;background:var(--bg2);cursor:pointer;transition:all .12s}
.crow:hover{border-color:var(--bd)}
.cav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.post{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:12px;margin-bottom:10px}
.phead{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.pav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.pac{display:flex;gap:10px;margin-top:9px;padding-top:9px;border-top:1px solid var(--b)}
.pa{display:flex;align-items:center;gap:4px;color:var(--t3);font-size:10px;cursor:pointer;padding:3px 7px;border-radius:6px;transition:all .12s}
.pa:hover{background:var(--bg3);color:var(--t)}
.jcard{background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:12px;margin-bottom:9px;cursor:pointer;transition:all .12s}
.jcard:hover{border-color:var(--blue)}
.aim{background:var(--bg3);border-radius:10px;padding:10px;font-size:11px;line-height:1.6;margin-bottom:10px;border-left:2px solid var(--purple)}
.ach{display:inline-block;background:var(--bd);color:var(--blue);border-radius:10px;padding:3px 9px;font-size:10px;margin:3px;cursor:pointer;border:1px solid #4f8ef715}
.ach:hover{background:#1e4a8c}
.si2{display:flex;gap:10px;align-items:center;padding:8px 10px;background:var(--bg3);border-radius:8px;margin-bottom:6px;border:1px solid var(--b)}
.st2{font-size:10px;color:var(--t3);width:52px;flex-shrink:0}
.vg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.vb{background:#111827;border:1px solid var(--b);border-radius:10px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.vl{position:absolute;bottom:8px;left:8px;background:#00000099;border-radius:5px;padding:2px 7px;font-size:10px}
.lbrow{display:flex;align-items:center;gap:9px;padding:8px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:background .12s}
.lbrow:hover{background:var(--bg3)}
.npanel{background:var(--bg3);border:1px solid var(--b2);border-radius:12px;padding:12px;margin-top:6px;display:none}
.npanel.open{display:block}
.ni{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--b)}
.ni:last-child{border-bottom:none}
.nd{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
</style>
</head>

  <h1 style="font-size:24px;font-weight:700">ResumeVerify X™</h1>
  <p style="color:var(--t3);font-size:13px">Universal AI Career, Learning, Placement & Hiring OS</p>

</div>
</body>
</html>
